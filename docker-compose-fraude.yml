name: fraude-test

services:
  # --- Database ---
  fraude-postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: fraude_db
      POSTGRES_USER: fraude_user
      POSTGRES_PASSWORD: fraude_pass
    ports:
      - "5435:5432"
    volumes:
      - fraude_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fraude_user -d fraude_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fraude-test-net

  # --- Fraud Service ---
  fraude:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8084:8084"
    environment:
      FRAUDE_DB_HOST: fraude-postgres
      FRAUDE_DB_PORT: 5432
      FRAUDE_DB_NAME: fraude_db
      FRAUDE_DB_USER: fraude_user
      FRAUDE_DB_PASSWORD: fraude_pass
    depends_on:
      fraude-postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/api/v1/fraude/health > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 45s
    networks:
      - fraude-test-net

  # --- Frontend (Sello Legitimo) ---
  frontend:
    build:
      context: ../../sello-legitimo-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_GATEWAY_URL: "http://localhost:8091"
    ports:
      - "8080:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - fraude-test-net

  # --- Gateway (Nginx) ---
  gateway:
    image: nginx:alpine
    ports:
      - "8091:80"
    volumes:
      - ./gateway/nginx.test.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - fraude
      - frontend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ > /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 10s
    networks:
      - fraude-test-net

networks:
  fraude-test-net:
    driver: bridge

volumes:
  fraude_postgres_data:
